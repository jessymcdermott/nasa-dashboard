# EXAMPLE ONLY - This file is intentionally vulnerable for demonstration purposes
# DO NOT place in .github/workflows/
#
# Vulnerability: Static Code Injection via pull_request_target
# The pull_request_target trigger runs with write permissions and access to secrets,
# even for PRs from forks. User-controlled PR_TITLE and PR_BODY are injected directly
# into a shell script without sanitization, enabling arbitrary code execution.

name: Validate PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PR title format
        uses: actions/github-script@v7
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            const title = process.env.PR_TITLE;
            const body = process.env.PR_BODY;

            // Validate title matches conventional commit format
            const validPrefixes = ['feat', 'fix', 'docs', 'style', 'refactor', 'test', 'chore'];
            const titleRegex = new RegExp(`^(${validPrefixes.join('|')})(\\(.+\\))?!?: .+`);

            if (!titleRegex.test(title)) {
              core.setFailed(`PR title "${title}" does not match conventional commit format`);
            }

            // Log the PR body for auditing
            console.log(`Processing PR: ${title}`);
            console.log(`Body: ${body}`);

      - name: Post comment with validation result
        if: failure()
        run: |
          # Dangerous: PR_TITLE and PR_BODY are user-controlled and injected unsanitized
          echo "Validation failed for PR: ${{ github.event.pull_request.title }}"
          echo "PR Body: ${{ github.event.pull_request.body }}"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d "{\"body\": \"❌ PR title '${{ github.event.pull_request.title }}' does not follow conventional commit format.\"}"
