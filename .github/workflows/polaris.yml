name: Polaris Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  polaris-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (required for Detect)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt
          pip list

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Polaris Scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ secrets.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}

          # ✅ your correct app + project names
          polaris_application_name: "jessy-nasa-dashboard"
          polaris_project_name: "jessy-nasa-dashboard"

          polaris_assessment_types: "SCA"
          polaris_branch_name: ${{ github.ref_name }}

          polaris_prcomment_enabled: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # prevents strict scan failure on minor resolution issues
          detect_accuracy_required: LOW