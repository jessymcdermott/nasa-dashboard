name: Polaris Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  polaris-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel pip-tools
          pip install -r requirements.txt
          # Create dependency snapshot for Black Duck
          pip freeze > requirements-lock.txt
      - name: Verify pkg_resources
        run: |
          python -c "import pkg_resources; print('pkg_resources OK')"
      - name: Resolve Python path
        run: echo "DETECT_PYTHON_PATH=$(which python)" >> "$GITHUB_ENV"

      - name: Polaris Scan
        uses: blackduck-inc/black-duck-security-scan@v2
        env:
          DETECT_ACCURACY_REQUIRED: NONE
        with:
          polaris_server_url: ${{ secrets.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: "jessy-nasa-dashboard"
          polaris_project_name: "jessy-nasa-dashboard"
          polaris_assessment_types: "SAST,SCA"
          polaris_branch_name: ${{ github.ref_name }}
          polaris_prComment_enabled: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t nasa-dashboard:${{ github.sha }} .

      - name: Save image as archive for scanning
        run: docker save nasa-dashboard:${{ github.sha }} -o nasa-dashboard.tar

      - name: Polaris Container Scan
        uses: blackduck-inc/black-duck-security-scan@v2.11.0
        with:
          polaris_server_url: ${{ secrets.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: "jessy-nasa-dashboard"
          polaris_project_name: "jessy-nasa-dashboard"
          polaris_assessment_types: "SCA"
          polaris_test_sca_type: "SCA-CONTAINER"
          polaris_container_name: "nasa-dashboard"
          polaris_artifactToUpload: "nasa-dashboard.tar"
          polaris_branch_name: ${{ github.ref_name }}
          polaris_prComment_enabled: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

  blackduck-sca-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Black Duck SCA Scan
        uses: blackduck-inc/black-duck-security-scan@v2.11.0
        with:
          blackducksca_url: ${{ secrets.BLACKDUCKSCA_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCKSCA_TOKEN }}
          blackducksca_scan_full: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
