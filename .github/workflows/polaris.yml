name: Polaris Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  polaris-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901fc75794662edbb965a5bc2a6e66e5e9

      - name: Set up Python
        uses: actions/setup-python@0a5c47080f01d68f4b69b27a841e1e5395180200
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel pip-tools

          pip install -r requirements.txt

          # Create dependency snapshot for Black Duck
          pip freeze > requirements-lock.txt

      - name: Verify pkg_resources
        run: |
          python -c "import pkg_resources; print('pkg_resources OK')"

      - name: Black Duck Security Scan
        uses: blackduck-inc/black-duck-security-scan@v2.10.0
        env:
          DETECT_PYTHON_PATH: /opt/hostedtoolcache/Python/3.11.15/x64/bin/python
          DETECT_ACCURACY_REQUIRED: NONE
        with:
          polaris_server_url: ${{ secrets.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: "jessy-nasa-dashboard"
          polaris_project_name: "jessy-nasa-dashboard"
          polaris_assessment_types: "SCA"
          polaris_branch_name: ${{ github.ref_name }}
          polaris_prComment_enabled: true
          github_token: ${{ secrets.GITHUB_TOKEN }}